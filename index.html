<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hide and Seek Neural</title>
  </head>
  <body>
    <div id="app">

      <canvas id="canvas"></canvas>

      <div id="hud">

        <div class="hud-panel">
          <span class="hud-label seeker">⬤ Seekers</span>
          <span class="hud-score" id="score-seekers">0</span>
        </div>

        <div class="hud-panel hud-center">
          <span class="hud-timer" id="timer">2:00</span>
          <div class="freeze-bar-wrap">
            <div class="freeze-bar" id="freeze-bar"></div>
          </div>
          <span class="hud-status" id="status">freeze</span>
        </div>

        <div class="hud-panel">
          <span class="hud-label hider">⬤ Hiders</span>
          <span class="hud-score" id="score-hiders">0</span>
        </div>

      </div>

      <div id="controls">
        <div class="controls-team hider">
          <span class="controls-title">Hiders</span>
          <div class="controls-row">
            <span class="controls-player">A1</span>
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
          </div>
          <div class="controls-row">
            <span class="controls-player">A2</span>
            <kbd>T</kbd><kbd>F</kbd><kbd>G</kbd><kbd>H</kbd>
          </div>
        </div>

        <div class="controls-team seeker">
          <span class="controls-title">Seekers</span>
          <div class="controls-row">
            <span class="controls-player">B1</span>
            <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>
          </div>
          <div class="controls-row">
            <span class="controls-player">B2</span>
            <kbd>I</kbd><kbd>J</kbd><kbd>K</kbd><kbd>L</kbd>
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
